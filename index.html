<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Colaboradores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-layout">
        
        <div class="card-box">
            <h2>Registro de Colaboradores</h2>
            <form id="colaboradorForm" novalidate>
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre">
                    <div class="error-message" id="errorNombre"></div>
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido">
                    <div class="error-message" id="errorApellido"></div>
                </div>

                <div class="form-group">
                    <label for="cargo">Cargo:</label>
                    <select id="cargo" name="cargo">
                        <option value="">-- Seleccione un cargo --</option>
                        <option value="Administrativo">Administrativo</option>
                        <option value="Desarrollador">Desarrollador/a</option>
                        <option value="Diseñador">Diseñador/a</option>
                        <option value="Gerente">Gerente</option>
                        <option value="Soporte Técnico">Soporte Técnico</option>
                    </select>
                    <div class="error-message" id="errorCargo"></div>
                </div>

                <div class="form-group">
                    <label for="correo">Correo Electrónico Corporativo:</label>
                    <input type="email" id="correo" name="correo" placeholder="usuario@empresa.cl">
                    <div class="error-message" id="errorCorreo"></div>
                </div>

                <button type="submit" class="btn-submit">Registrar Colaborador</button>
            </form>
        </div>

        <div class="card-box list-wide">
        <h2>Listado Activo</h2>
        <div class="search-group">
            <select id="filtroCriterio">
                <option value="todos">Buscar en Todos los campos</option>
                <option value="nombre">Buscar solo por Nombre/Apellido</option>
                <option value="cargo">Buscar solo por Cargo</option>
            </select>
        <input type="text" id="buscador" placeholder="Escribe para buscar en tiempo real...">
        </div>

            <table>
                <thead>
                    <tr>
                        <th>Nombre Completo</th>
                        <th>Cargo</th>
                        <th>Correo Electrónico</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaColaboradores">
                    </tbody>
            </table>
        </div>

    </div> <script src="script.js"></script>
</body>
</html>
